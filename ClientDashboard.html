<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="./css/style2.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }

  </style>
  <title>Document</title>
</head>
<body>
  <div class="client-dashboard">

    <!-- HEADER -->
    <div class="header">
      <div class="div">

          <img class="heart" src="ClientDashheart0.svg" />

            <div class="h-1">

        <a href="ManagementDashboard.html" class="link">
          <div class="switch-to-management">Switch to Management</div>

      </div>
    </div>

    <nav class="navbar navbar-expand-lg" style="background-color: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 1rem;">
      <div class="container-fluid px-2">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#clientNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="clientNav">
          <ul class="navbar-nav gap-1">
            <li class="nav-item">
              <a class="nav-link active fw-semibold" style="color: #f03e6e;" href="ClientDashboard.html">
                <img src="ClientDashicon0.svg" style="width:16px; margin-right:5px;" />Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-secondary" href="ClientProfile.html">
                <img src="ClientDashicon1.svg" style="width:16px; margin-right:5px;" />Profile
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-secondary" href="ClientServReq.html">
                <img src="ClientDashicon2.svg" style="width:16px; margin-right:5px;" />New Request
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-secondary" href="ClientServHist.html">
                <img src="ClientDashicon3.svg" style="width:16px; margin-right:5px;" />History
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-secondary" href="ClientInvoices.html">
                <img src="ClientDashicon4.svg" style="width:16px; margin-right:5px;" />Invoices
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="h-12">
        <div class="welcome-back-sarah-johnson">Welcome back, Sarah Johnson!</div>
      </div>
      <div class="welcome">
        <div class="container3"></div>
        <a href="ClientServReq.html" class="button">
          <img class="icon8" src="ClientDashplus-circle0.svg" />
          <div class="new-service-request">New Service Request</div>
        </a>
      </div>
      <div class="account-summary">
        <div class="card">
          <div class="div3">
            <div class="container4">
              <div class="p">
                <div class="pending-requests">Pending Requests</div>
              </div>
              <div class="p2">
                <div class="_1">1</div>
              </div>
            </div>
          </div>
        </div>
        <div class="card2">
          <div class="div4">
            <div class="container5">
              <div class="p">
                <div class="upcoming-services">Upcoming Services</div>
              </div>
              <div class="p2">

        <div class="card3">
          <div class="div4">
            <div class="container6">

            <div class="view-all">View All</div>
          </a>
        </div>
        <div class="div6">
          <div class="container7">
            <div class="p3">
              <div class="dog-walking">Dog Walking</div>
            </div>
            <div class="p">
              <div class="_2-25-2026-at-10-00">2/25/2026 at 10:00</div>
            </div>
          </div>
          <div class="span">
            <div class="pending">Pending</div>
          </div>
        </div>
      </div>
